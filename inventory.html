<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medicine Inventory Grid</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
    padding: 20px;
}

.back-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    width: 42px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: white;
    border: 2px solid #007bff;
    border-radius: 8px;
    text-decoration: none;
    font-size: 22px;
    color: #007bff;
}

.add-box {
    display: flex;
    gap: 10px;
    max-width: 900px;
    margin: auto;
    margin-bottom: 25px;
}

input {
    flex: 1;
    padding: 12px;
}

button {
    padding: 12px 15px;
    border: none;
    background: #007bff;
    color: white;
    cursor: pointer;
    border-radius: 6px;
}

/* =========================
   GRID RESPONSIVE FIX
========================= */
.inventory-grid {
    max-width: 1200px;
    margin: auto;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 25px;
}

/* 💻 Tablet (2 per row) */
@media (max-width: 1000px) {
    .inventory-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

/* 📱 Phone (still 2 per row as requested) */
@media (max-width: 600px) {
    .inventory-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

/* CARD */
.card {
    background: white;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* IMAGE */
.img-box {
    width: 100%;
    height: 120px;
    background: linear-gradient(135deg, #dbeafe, #93c5fd);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    color: #1e3a8a;
}

/* NAME */
.name {
    font-size: 18px;
    font-weight: bold;
}

/* CONTROLS */
.controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
}

.controls button {
    width: 40px;
    height: 40px;
    border: none;
    border-radius: 6px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
}

.minus { background: red; color: white; }
.plus { background: green; color: white; }

.delete-btn {
    margin-top: 5px;
    background: #3164b5;
    color: white;
}

.header {
    text-align: center;
    color: #3164b5;
}
</style>
</head>

<body>

<br><br>
<a href="dashboard.html" class="back-btn">←</a>

<h2 class="header">Medicine Inventory System</h2>

<div class="add-box">
    <input type="text" id="medName" placeholder="Enter medicine name">
    <button onclick="addMedicine()">Add</button>
</div>

<div style="text-align:center; margin-bottom:20px;">
    <button onclick="finishTutorial()" style="background:green;">
        Finish Tutorial
    </button>
</div>

<div class="inventory-grid" id="grid"></div>

<script>

//
// 🚨 STEP 2 LOCK
//
if (localStorage.getItem("step2") !== "done") {
    alert("You must clear records first!");
    window.location.href = "dashboard.html";
}

let medicines = [];
let addedMedicine = false;

function addMedicine() {
    const name = document.getElementById("medName").value;
    if (!name) return;

    medicines.push({ name: name, stock: 0 });
    document.getElementById("medName").value = "";

    addedMedicine = true;
    localStorage.setItem("step3", "done");

    render();
}

function increase(i) {
    medicines[i].stock++;
    render();
}

function decrease(i) {
    if (medicines[i].stock > 0) {
        medicines[i].stock--;
    }
    render();
}

function deleteMedicine(i) {
    medicines.splice(i, 1);
    render();
}

function render() {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    medicines.forEach((med, i) => {
        grid.innerHTML += `
            <div class="card">

                <div class="img-box">
                    Medicine Image
                </div>

                <div class="name">${med.name}</div>

                <div class="controls">
                    <button class="minus" onclick="decrease(${i})">-</button>
                    <div class="stock">${med.stock}</div>
                    <button class="plus" onclick="increase(${i})">+</button>
                </div>

                <button class="delete-btn" onclick="deleteMedicine(${i})">
                    Delete
                </button>

            </div>
        `;
    });
}

function finishTutorial() {
    if (!addedMedicine) {
        alert("You must add at least 1 medicine first!");
        return;
    }

    localStorage.setItem("step3", "done");
    window.location.href = "recipt.html";
}

render();

</script>

</body>
</html>
