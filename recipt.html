<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receipt</title>

<style>

/* 🧱 CENTER SCREEN */
body {
    margin: 0;
    height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    font-family: Arial;
    background: #f3f3f3;
}

/* 📦 RECEIPT BOX */
.box {
    position: relative;
    width: 400px;
    min-height: 350px;
    padding: 30px;
    background: white;
    border-radius: 10px;

    text-align: center;
    z-index: 1;

    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* 🔵 ANIMATED BORDER */
.box::before {
    content: "";
    position: absolute;
    top: -3px;
    left: -3px;
    right: -3px;
    bottom: -3px;
    border-radius: 12px;

    background: linear-gradient(
        90deg,
        #00aaff,
        #0057ff,
        #00c3ff,
        #0057ff,
        #00aaff
    );

    background-size: 300% 300%;
    z-index: -1;

    animation: borderMove 4s linear infinite;
}

/* INNER WHITE CUT */
.box::after {
    content: "";
    position: absolute;
    top: 3px;
    left: 3px;
    right: 3px;
    bottom: 3px;
    background: white;
    border-radius: 8px;
    z-index: -1;
}

/* BORDER ANIMATION */
@keyframes borderMove {
    0% { background-position: 0% 50%; }
    100% { background-position: 100% 50%; }
}

/* 📝 TEXT */
h2 {
    font-size: 22px;
}

p {
    font-size: 16px;
    line-height: 1.6;
}

#name, #section {
    font-size: 18px;
    font-weight: bold;
    margin-top: 10px;
}

/* 🔘 BUTTON CONTAINER */
.button-container {
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.button-container button {
    padding: 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;

    background: #007bff;
    color: white;
    font-size: 16px;
    font-weight: bold;

    transition: 0.2s ease;
}

.button-container button:hover {
    background: #0056d6;
}

/* 📱 MOBILE */
@media (max-width: 600px) {
    .box {
        width: 90%;
        min-height: 250px;
        padding: 25px;
        margin-left: 20px;
        margin-right: 20px;
    }

    h2 {
        font-size: 28px;
    }

    p {
        font-size: 18px;
    }

    #name, #section {
        font-size: 22px;
    }
}

</style>
</head>

<body>

<div class="box">

    <h2>🎉 Tutorial Completed</h2>

    <p>
        CONGRATS ON COMPLETING THE TUTORIAL<br>
        Please show this receipt to the clinic staff
    </p>

    <p id="name">Name:</p>
    <p id="section">Section:</p>

    <!-- 🔘 BUTTONS -->
    <div class="button-container">

        <button onclick="goLanding()">BACK TO THE LANDING PAGE</button>
        <button onclick="goLogin()">LOGIN AGAIN</button>

    </div>

</div>

<script>

// 🚨 LOAD USER FROM LOCALSTORAGE
const user = JSON.parse(localStorage.getItem("currentUser"));

// ❌ NO DATA
if (!user) {
    alert("No user data found!");
    window.location.href = "index.html";
}

// ✅ DISPLAY DATA
document.getElementById("name").innerText = "Name: " + user.name;
document.getElementById("section").innerText = "Section: " + user.section;

// 🔁 NAVIGATION
function goLanding() {
    window.location.href = "index.html";
}

function goLogin() {
    window.location.href = "loginpage.html";
}

</script>

</body>
</html>
