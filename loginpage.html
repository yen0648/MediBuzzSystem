<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinic Login</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    background: #feffd2;
}

.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
}

.box {
    background: white;
    padding: 20px;
    width: 300px;
    border: 2px solid black;
    border-radius: 10px;
    box-shadow: 10px 15px 10px rgba(0,0,0,0.1);
}

.image {
    width: 100%;
    max-width: 250px;
    margin-bottom: 10px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
}

button {
    width: 100%;
    padding: 10px;
    background: #007bff;
    color: white;
    border: none;
    margin-top: 15px;
}

p {
    margin-top: 20px;
    max-width: 400px;
    font-size: 13px;
    color: #707070;
}
</style>
</head>

<body>

<div class="container">

    <div class="box">
        <img src="image-removebg-preview (4).png" class="image">

        <input type="text" id="studentId" placeholder="Student ID" required>
        <input type="text" id="name" placeholder="Student Name" required>
        <input type="text" id="section" placeholder="Section" required>
        <input type="text" id="reason" placeholder="Reason" required>
        <input type="text" id="phone" placeholder="Parent Phone" required>

        <button onclick="saveData()">Submit</button>
    </div>

    <p>
        This website is a replication of the “MediBuzz System,” designed to give students a preview of how the school clinic processes and saves student information.
    </p>

</div>

<script>
function saveData() {
    const studentId = document.getElementById("studentId").value;
    const name = document.getElementById("name").value;
    const section = document.getElementById("section").value;
    const reason = document.getElementById("reason").value;
    const phone = document.getElementById("phone").value;

    // ✅ MUST FILL ALL INPUTS
    if (!studentId || !name || !section || !reason || !phone) {
        alert("Please fill out all fields!");
        return;
    }

    const data = { studentId, name, section, reason, phone };

    let records = JSON.parse(localStorage.getItem("clinicRecords")) || [];
    records.push(data);

    localStorage.setItem("clinicRecords", JSON.stringify(records));

    // 🔥 TUTORIAL STEP 1 COMPLETE
    localStorage.setItem("currentUser", JSON.stringify(data));
    localStorage.setItem("step1", "done");

    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
